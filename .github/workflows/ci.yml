name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
          - name: Linux
            runner: ubuntu-latest
          - name: Windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeveloperBeau/resolve-swift@v2
        with:
          swift-version: '6.3.2'
      - name: Build
        run: swift build -v
      - name: Test (parallel bulk, excludes KAT)
        run: swift test -v --skip KATTests
      - name: Test (deterministic KAT, serial)
        run: swift test -v --no-parallel --filter KATTests

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: skiptools/swift-android-action@v2
        with:
          swift-version: '6.3'
          run-tests: true
          free-disk-space: true
          # Skip KATTests on Android: they seed liboqs's process-global NIST-KAT
          # DRBG and must run serially (the build job runs them via
          # `--no-parallel --filter KATTests`). This action runs `swift test` in
          # parallel, which would race the global RNG and flake. KAT determinism
          # is validated on the macOS/Linux build job.
          swift-test-flags: '--skip KATTests'
